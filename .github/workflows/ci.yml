name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# This workflow only validates. It never pushes images, creates releases or runs
# npm publish — releases are created manually after HCU verification.
permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (server + SPA)
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build (server + SPA + icon)
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build arm64 image (load only, never push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          load: true
          tags: hmip-hcu-modbus:ci
